<nav class="breadcrumbs" aria-label="Навигационная цепочка"><ol><li><a href="index.html">Главная</a></li><li><a href="press-sluzhba.html">Пресс-служба</a></li><li><span aria-current="page">Задать вопрос</span></li></ol></nav><header class="page-intro"><h1>Задать вопрос</h1><p class="lead">Официальная информация ГКП «Алматы Су» для потребителей и партнёров.</p></header><div class="prose prose--form">

    <div class="field field--wide"><label for="q-msg">Вопрос</label><textarea id="q-msg" name="message" rows="5" required placeholder="Кратко опишите суть обращения"></textarea></div>
    <div class="field field--hp" aria-hidden="true">
      <label for="q-hp">Не заполняйте</label>
      <input id="q-hp" name="website" type="text" tabindex="-1" autocomplete="off" />
    </div>
  </div>
  <div class="form-actions"><button type="submit" class="btn-primary">Отправить</button><p class="form-hint">Нажимая кнопку, вы соглашаетесь с обработкой персональных данных в рамках обращения.</p></div>
